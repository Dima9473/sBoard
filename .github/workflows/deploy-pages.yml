# Публикация SPA на GitHub Pages (https://dima9473.github.io/sBoard/)
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        run: npm run build

      - name: Verify production index.html
        run: |
          if grep -q 'src/main.tsx' dist/index.html; then
            echo "::error::В dist/index.html остался dev-вход — сборка некорректна"
            cat dist/index.html
            exit 1
          fi
          grep -q '/assets/index-' dist/index.html || (echo "::error::Нет bundle в dist/index.html" && exit 1)

      - name: Sync docs/ for branch-based Pages (main /docs)
        run: |
          rm -rf docs
          cp -r dist docs

      - name: Commit docs/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git diff --staged --quiet && echo "docs без изменений" && exit 0
          git commit -m "deploy: update docs/ from dist [skip ci]"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
